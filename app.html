  <title>GeoVisAR</title>
  <script>
    async function fetchGeodata() {
      // load JSON from file and return it
      try {
        const response = await fetch("assets/geodata.json");
        const jsonGeodata = await response.json();
        return jsonGeodata;
      } catch (error) {
        console.error(error);
      }
    }

    async function setMarkers() {
      // set the marker HTML content
      const geodata = await fetchGeodata();
      var htmlString = "";
      geodata.data.forEach(element => {
        if (element.type == "circle") {
          htmlString += `<a-circle id="${element.type}" color="${element.color}" radius="20" scale="${element.scale}" gps-entity-place="latitude: ${element.lat}; longitude: ${element.lon};"></a-circle>\n`;
        } else if (element.type == "gltf-model") {
          htmlString += `<a-gltf-model src="#arrow" scale="${element.scale}" gps-entity-place="latitude: ${element.lat}; longitude: ${element.lon};">
        <a-animation attribute="rotation" dur="7000" to="0 360 0" easing="linear" repeat="indefinite"></a-animation>
      </a-gltf-model>\n`;
        }

      });
      document.getElementById("#markers").outerHTML = htmlString;
    }

    setMarkers();
  </script>
  <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
</head>
